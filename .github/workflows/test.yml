name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
      - name: Unit tests (ASan/UBSan)
        run: pixi run test
      - name: Static analysis (gcc -fanalyzer, vs baseline)
        run: pixi run analyze
      - name: cppcheck (informational until triaged)
        continue-on-error: true
        run: pixi run cppcheck --enable=warning,portability --inline-suppr --suppress='*:src/lib/*' --error-exitcode=1 src
